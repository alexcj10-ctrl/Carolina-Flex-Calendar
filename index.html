<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carolina Flex Calendar</title>
  <style>
    :root{--bg:#050505;--card:#111114;--card2:#18181d;--text:#f7f7f8;--muted:#8e8e98;--red:#e50914;--red2:#ff3340;--line:rgba(255,255,255,.09)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(229,9,20,.32),transparent 34%),linear-gradient(180deg,#050505,#0b0b0d)}
    .app{max-width:1100px;margin:0 auto;padding:18px;display:grid;gap:16px}.hero,.panel,.stat{background:rgba(17,17,20,.84);border:1px solid var(--line);border-radius:28px;box-shadow:0 28px 80px rgba(0,0,0,.38);backdrop-filter:blur(16px)}
    .hero{padding:24px;display:flex;justify-content:space-between;gap:18px;align-items:center}.brand{color:var(--red2);text-transform:uppercase;letter-spacing:.18em;font-weight:900;font-size:12px;margin-bottom:7px}h1,h2,h3,p{margin:0}h1{font-size:clamp(34px,7vw,66px);letter-spacing:-.06em;line-height:.92}.sub{color:var(--muted);margin-top:10px}.logo{width:72px;height:72px;border-radius:24px;display:grid;place-items:center;font-size:34px;font-weight:900;background:linear-gradient(145deg,var(--red),#68060b);box-shadow:0 18px 45px rgba(229,9,20,.35)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{padding:17px;min-height:105px;display:flex;flex-direction:column;justify-content:space-between}.stat span{color:var(--muted);font-size:13px}.stat strong{font-size:27px;letter-spacing:-.04em}.stat.main{background:linear-gradient(145deg,#260509,#111)}.panel{padding:20px}.monthTop{display:flex;justify-content:space-between;align-items:end;margin-bottom:16px}.monthTop h2{font-size:34px;letter-spacing:-.04em}.monthTop span{color:var(--muted)}
    .week,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.week{color:var(--muted);text-align:center;font-weight:900;font-size:13px;margin-bottom:8px}.day,.empty{min-height:95px;border-radius:18px}.day{border:1px solid var(--line);background:var(--card2);color:var(--text);padding:10px;display:flex;flex-direction:column;gap:7px;text-align:left;position:relative;cursor:pointer;transition:.18s}.day:hover,.day.selected{border-color:var(--red2);transform:translateY(-2px)}.day.work{background:linear-gradient(180deg,#1c1c21,#111114)}.num{font-size:21px;font-weight:950}.pill{width:max-content;max-width:100%;padding:5px 8px;border-radius:999px;font-size:11px;font-weight:900}.mattina{background:rgba(255,255,255,.1)}.pomeriggio{background:rgba(229,9,20,.22);color:#ff7780}.dot{position:absolute;right:12px;bottom:5px;color:var(--red2);font-size:28px}
    .detail{display:grid;grid-template-columns:1fr 1fr;gap:14px}.dayHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.navBtn,.addBtn,.delBtn{border:0;background:#24242a;color:white;border-radius:14px;height:42px;min-width:42px;font-size:20px}.shiftBox{padding:18px;border-radius:24px;background:linear-gradient(145deg,rgba(229,9,20,.25),rgba(255,255,255,.04));border:1px solid rgba(229,9,20,.3)}.label,.muted{color:var(--muted)}.shiftBox h3{font-size:32px;margin:5px 0;letter-spacing:-.04em}.events{padding:18px;border-radius:24px;background:#0b0b0d;border:1px solid var(--line)}.add{display:flex;gap:9px;margin:14px 0}input{flex:1;background:#16161a;border:1px solid var(--line);border-radius:16px;color:white;padding:0 13px;outline:0}input:focus{border-color:var(--red2)}.eventList{display:grid;gap:8px}.event{display:flex;justify-content:space-between;align-items:center;background:#16161a;border:1px solid var(--line);border-radius:15px;padding:10px 11px}.delBtn{height:34px;min-width:34px;font-size:15px}
    @media(max-width:850px){.stats{grid-template-columns:repeat(2,1fr)}.detail{grid-template-columns:1fr}.day,.empty{min-height:76px}}@media(max-width:520px){.app{padding:12px}.hero,.panel{border-radius:22px;padding:16px}.logo{display:none}.day,.empty{min-height:62px;border-radius:14px;padding:7px}.week,.grid{gap:5px}.pill{font-size:9px;padding:4px 6px}.num{font-size:17px}.stat{min-height:92px}.stat strong{font-size:22px}.monthTop h2{font-size:28px}}
  </style>
</head>
<body>
  <div class="app">
    <section class="hero"><div><div class="brand">Flex Zone</div><h1>Carolina Flex Calendar</h1><p class="sub">Turni Luglio 2026 · agenda personale modificabile</p></div><div class="logo">C</div></section>
    <section class="stats"><div class="stat main"><span>Stipendio</span><strong id="salary">€0</strong></div><div class="stat"><span>Ore totali</span><strong id="hours">0h</strong></div><div class="stat"><span>Giorni lavorati</span><strong id="days">0</strong></div><div class="stat"><span>Mattina / Pomeriggio</span><strong id="split">0 / 0</strong></div></section>
    <section class="panel"><div class="monthTop"><h2>Luglio 2026</h2><span id="turniLabel"></span></div><div class="week"><div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div></div><div class="grid" id="calendar"></div></section>
    <section class="detail"><div class="panel"><div class="dayHeader"><button class="navBtn" onclick="moveDay(-1)">‹</button><div style="text-align:center"><p class="label">Giorno selezionato</p><h2 id="selectedTitle">1 Luglio</h2></div><button class="navBtn" onclick="moveDay(1)">›</button></div><div class="shiftBox"><p class="label">Turno Carolina</p><h3 id="shiftName">Riposo</h3><p id="shiftPay">Nessun turno segnato</p></div></div><div class="panel"><div class="events"><h3>Agenda personale</h3><div class="add"><input id="eventInput" placeholder="Aggiungi evento..." onkeydown="if(event.key==='Enter') addEvent()"/><button class="addBtn" onclick="addEvent()">+</button></div><div id="eventsList" class="eventList"></div></div></div></section>
  </div>
  <script>
    const YEAR=2026,MONTH=6,RATE=6.5;let selectedDay=1;const shifts=[{date:"2026-07-01",shift:"pomeriggio"},{date:"2026-07-02",shift:"mattina"},{date:"2026-07-03",shift:"pomeriggio"},{date:"2026-07-06",shift:"pomeriggio"},{date:"2026-07-07",shift:"pomeriggio"},{date:"2026-07-08",shift:"mattina"},{date:"2026-07-09",shift:"pomeriggio"},{date:"2026-07-10",shift:"mattina"},{date:"2026-07-13",shift:"mattina"},{date:"2026-07-14",shift:"pomeriggio"},{date:"2026-07-15",shift:"mattina"},{date:"2026-07-17",shift:"pomeriggio"},{date:"2026-07-20",shift:"mattina"},{date:"2026-07-22",shift:"pomeriggio"},{date:"2026-07-23",shift:"pomeriggio"},{date:"2026-07-24",shift:"pomeriggio"},{date:"2026-07-27",shift:"pomeriggio"},{date:"2026-07-28",shift:"pomeriggio"},{date:"2026-07-29",shift:"pomeriggio"},{date:"2026-07-30",shift:"mattina"},{date:"2026-07-31",shift:"pomeriggio"}];
    const shiftsByDate=Object.fromEntries(shifts.map(s=>[s.date,s.shift]));let events=JSON.parse(localStorage.getItem("carolina-flex-events")||"{}");function pad(n){return String(n).padStart(2,"0")}function key(day){return `${YEAR}-07-${pad(day)}`}function euro(v){return v.toLocaleString("it-IT",{style:"currency",currency:"EUR"})}function getHours(date,shift){const d=new Date(date+"T12:00:00");if(d.getDay()===6&&shift==="mattina")return 5;return 6}
    function updateStats(){const totalHours=shifts.reduce((sum,s)=>sum+getHours(s.date,s.shift),0);const salary=totalHours*RATE;const mornings=shifts.filter(s=>s.shift==="mattina").length;const afternoons=shifts.filter(s=>s.shift==="pomeriggio").length;salaryEl.textContent=euro(salary);hours.textContent=totalHours+"h";days.textContent=shifts.length;split.textContent=`${mornings} / ${afternoons}`;turniLabel.textContent=`${shifts.length} turni`}
    function renderCalendar(){calendar.innerHTML="";const first=new Date(YEAR,MONTH,1);const startBlank=(first.getDay()+6)%7;const daysInMonth=new Date(YEAR,MONTH+1,0).getDate();for(let i=0;i<startBlank;i++){const e=document.createElement("div");e.className="empty";calendar.appendChild(e)}for(let day=1;day<=daysInMonth;day++){const date=key(day),shift=shiftsByDate[date],hasEvents=(events[date]||[]).length>0;const btn=document.createElement("button");btn.className=`day ${shift?"work":""} ${selectedDay===day?"selected":""}`;btn.onclick=()=>{selectedDay=day;renderAll()};btn.innerHTML=`<span class="num">${day}</span>${shift?`<span class="pill ${shift}">${shift==="mattina"?"Mattina":"Pomeriggio"}</span>`:""}${hasEvents?`<span class="dot">•</span>`:""}`;calendar.appendChild(btn)}}
    function renderDetail(){const date=key(selectedDay),shift=shiftsByDate[date];selectedTitle.textContent=`${selectedDay} Luglio`;if(shift){const h=getHours(date,shift);shiftName.textContent=shift==="mattina"?"Mattina":"Pomeriggio";shiftPay.textContent=`${h} ore · ${euro(h*RATE)}`}else{shiftName.textContent="Riposo";shiftPay.textContent="Nessun turno segnato"}const items=events[date]||[];eventsList.innerHTML=items.length?items.map((ev,i)=>`<div class="event"><span>${ev.replaceAll("<","&lt;").replaceAll(">","&gt;")}</span><button class="delBtn" onclick="deleteEvent(${i})">×</button></div>`).join(""):`<p class="muted">Nessun evento per questo giorno.</p>`}
    function addEvent(){const text=eventInput.value.trim();if(!text)return;const date=key(selectedDay);events[date]=[...(events[date]||[]),text];localStorage.setItem("carolina-flex-events",JSON.stringify(events));eventInput.value="";renderAll()}function deleteEvent(index){const date=key(selectedDay);events[date].splice(index,1);localStorage.setItem("carolina-flex-events",JSON.stringify(events));renderAll()}function moveDay(delta){selectedDay=Math.max(1,Math.min(31,selectedDay+delta));renderAll()}
    const salaryEl=document.getElementById("salary");renderAll();
  </script>
</body>
</html>
